repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: bash -c "cd frontend && bun x eslint --fix ."
        language: system
        files: ^frontend/
        types_or: [javascript, svelte]
        pass_filenames: false
      - id: frontend-prettier
        name: frontend-prettier
        entry: bash -c "cd frontend && bun x prettier --write ."
        language: system
        files: ^frontend/
        types_or: [javascript, svelte, css, html, json, markdown]
        pass_filenames: false
